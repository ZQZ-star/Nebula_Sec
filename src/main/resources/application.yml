server:
  port: 8080

spring:
  # JDK 21 虚拟线程
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/nebula_sec
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
      # password: your_redis_password
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,heapdump,threaddump
